<svg viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Primary Grayscale Palette -->
    <linearGradient id="lightFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="midShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcdcdc;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#b0b0b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="deepShadow" x1="60%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" style="stop-color:#666666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="highlight" cx="20%" cy="20%" r="80%" fx="20%" fy="20%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>

    <!-- Refined Shadow Gradient for the main concave area -->
    <linearGradient id="concaveShadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="40%" style="stop-color:#4a4a4a;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0.9" />
    </linearGradient>

    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1000" height="800" fill="#fcfcfc" />

  <!-- Layer 1: Top Light Flow -->
  <g class="wave-group wave-group-1">
    <path class="wave-path" d="M0,0 L1000,0 L1000,300 C800,450 400,100 0,350 Z" fill="url(#lightFlow)" />
  </g>
  <rect width="1000" height="400" fill="url(#highlight)" pointer-events="none" />

  <!-- Layer 2: Middle Sculptural Wave (The 'S' Curve) -->
  <g class="wave-group wave-group-2">
    <path class="wave-path" d="M0,320 C250,150 750,550 1000,350 L1000,800 L0,800 Z" fill="url(#midShadow)" />
  </g>

  <!-- Layer 3: The Deep Concave Shadow (The dark 'pocket') -->
  <!-- This shape captures the middle-left to bottom-center dark valley -->
  <g class="wave-group wave-group-3">
    <path class="wave-path" d="M150,380 C350,550 750,950 900,650 C800,850 400,900 150,380 Z" fill="url(#deepShadow)" opacity="0.8" />
  </g>
  
  <!-- Layer 4: Lower Wave Ridge -->
  <g class="wave-group wave-group-4">
    <path class="wave-path" d="M0,500 C400,850 800,450 1000,600 L1000,800 L0,800 Z" fill="url(#deepShadow)" />
  </g>

  <!-- Layer 5: Bottom Foreground Detail -->
  <g class="wave-group wave-group-5">
    <path class="wave-path" d="M400,800 C600,650 900,750 1000,550 L1000,800 Z" fill="#1a1a1a" />
  </g>
  
  <!-- Overlays for smoother transitions -->
  <g class="wave-group wave-group-overlay">
    <path class="wave-path" d="M0,320 C250,150 750,550 1000,350 L1000,380 C750,580 250,180 0,350 Z" fill="url(#concaveShadow)" />
  </g>

</svg>
